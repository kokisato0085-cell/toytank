<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToyTank Maker</title>
    <style>
      body { font-family: sans-serif; margin: 16px; color: #222; }
      h1 { font-size: 18px; }
      .row { margin: 8px 0; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
      label { font-size: 13px; }
      input[type="number"] { width: 56px; }
      input[type="text"] { width: 140px; }
      button { cursor: pointer; font-size: 13px; padding: 4px 8px; }
      .tool { border: 1px solid #bbb; background: #f4f4f4; border-radius: 6px; }
      .tool.active { background: #2d7dd2; color: #fff; border-color: #2d7dd2; }
      .sep { width: 100%; height: 0; }
      #grid { border: 1px solid #999; touch-action: none; image-rendering: pixelated; }
      #messages { font-size: 13px; white-space: pre-wrap; min-height: 20px; margin-top: 8px; }
      #messages.ok { color: #2a8a3e; }
      #messages.ng { color: #c0392b; }
      .hint { font-size: 12px; color: #666; }
    </style>
  </head>
  <body>
    <h1>ToyTank Maker（ステージエディタ）</h1>

    <div class="row">
      <label>名前 <input type="text" id="in-name" value="stage-01" /></label>
      <label>列 <input type="number" id="in-cols" min="3" max="60" value="20" /></label>
      <label>行 <input type="number" id="in-rows" min="3" max="60" value="15" /></label>
      <label>セルpx <input type="number" id="in-cell" min="16" max="128" value="64" /></label>
      <button id="btn-resize">サイズ適用</button>
      <button id="btn-border">外周を鋼で囲む</button>
      <button id="btn-new">新規（全消去）</button>
    </div>

    <div class="row" id="palette">
      <span class="hint">道具：</span>
      <button class="tool active" data-tool="paint-floor">床</button>
      <button class="tool" data-tool="paint-steel">鋼（壊せない）</button>
      <button class="tool" data-tool="paint-brick">壊せる壁</button>
      <button class="tool" data-tool="place-p1">P1</button>
      <button class="tool" data-tool="place-p2">P2</button>
      <button class="tool" data-tool="place-enemy-stationary">敵(止)</button>
      <button class="tool" data-tool="place-enemy-mover">敵(動)</button>
      <button class="tool" data-tool="erase">消しゴム</button>
    </div>

    <div class="row">
      <canvas id="grid"></canvas>
    </div>

    <div class="row">
      <span class="hint">壁はドラッグで連続塗り。配置物はクリックで設置。</span>
    </div>

    <div class="row">
      <button id="btn-save-local">ブラウザに保存</button>
      <select id="sel-saved"><option value="">（保存したステージ）</option></select>
      <button id="btn-load-local">読込</button>
      <button id="btn-delete-local">削除</button>
    </div>

    <div class="row">
      <button id="btn-export">ファイルに書き出し（.json）</button>
      <label class="tool" style="padding: 4px 8px;">ファイル読み込み<input type="file" id="file-import" accept=".json,application/json" style="display:none" /></label>
    </div>

    <div id="messages"></div>

    <div class="row">
      <label style="width:100%">JSON（コピー可。ここに貼り付けて「テキストを反映」で読み込み）<br />
        <textarea id="json-text" rows="10" style="width:100%; font-family:monospace; font-size:12px;"></textarea>
      </label>
    </div>
    <div class="row">
      <button id="btn-apply-text">テキストを反映（読み込み）</button>
    </div>

    <script type="module" src="/src/editor/editor.ts"></script>
  </body>
</html>
