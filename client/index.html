<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ToyTank</title>
    <style>
      body { margin: 12px; font-family: sans-serif; }
      h1 { font-size: 20px; }
      .screen { display: none; }
      .screen.active { display: block; }

      /* タイトル背景のデモ（戦車AIバトル）。cover表示＋暗幕でメニューを読みやすく */
      #demo-bg {
        display: none; position: fixed; inset: 0; width: 100vw; height: 100vh;
        object-fit: contain; z-index: 0; pointer-events: none; background: #000;
      }
      #demo-scrim {
        display: none; position: fixed; inset: 0; z-index: 1; pointer-events: none;
        background: rgba(0, 0, 0, 0.5);
      }
      body.demo-on #demo-bg, body.demo-on #demo-scrim { display: block; }
      #screen-title { position: relative; z-index: 2; } /* デモ・暗幕より前面 */
      body.demo-on #screen-title h1 { color: #fff; text-shadow: 0 2px 6px #000; }
      .menu { display: flex; flex-direction: column; gap: 10px; max-width: 360px; margin-top: 16px; }
      .menu button, .menu a.btn {
        font-size: 17px; padding: 14px 16px; text-align: left; text-decoration: none; color: #222;
        border: 1px solid #999; border-radius: 8px; background: #f7f7f7; cursor: pointer;
        display: flex; justify-content: space-between; align-items: center;
      }
      .menu button:disabled { color: #aaa; background: #eee; cursor: not-allowed; }
      .badge { font-size: 11px; color: #fff; background: #c0392b; border-radius: 10px; padding: 2px 8px; }
      .badge.soon { background: #888; }
      .back { font-size: 14px; padding: 8px 14px; margin-bottom: 10px; cursor: pointer; }
      .row { margin: 12px 0; font-size: 14px; }
      .gamebar { margin: 6px 0; font-size: 13px; }
      .gamebar button, .gamebar select { font-size: 15px; padding: 6px 12px; }
      #custom-list { display: flex; flex-direction: column; gap: 8px; max-width: 360px; }
      #custom-list button {
        font-size: 16px; padding: 12px 16px; text-align: left;
        border: 1px solid #999; border-radius: 8px; background: #f7f7f7; cursor: pointer;
      }
      .muted-note { font-size: 13px; color: #777; }

      /* スマホ没入表示：ビューポート全体を黒で覆いキャンバスを最大化。
         操作ボタンは画面の四隅にオーバーレイ（縦スペースを予約しない）。
         実全画面API(Android)に頼らずCSSで実現＝iOSでも有効。 */
      #screen-game.immersive {
        position: fixed; inset: 0; z-index: 40; margin: 0; background: #000;
        display: flex; align-items: center; justify-content: center;
      }
      #screen-game.immersive #load-status,
      #screen-game.immersive .instructions { display: none; }
      #screen-game.immersive canvas { border: none; }
      #screen-game.immersive .gamebar {
        position: fixed; z-index: 45; margin: 0; padding: 2px;
        background: rgba(0, 0, 0, 0.35); border-radius: 8px;
        display: flex; gap: 4px; align-items: center; color: #ddd;
      }
      #screen-game.immersive .gamebar.top { top: 4px; left: 4px; }
      #screen-game.immersive .gamebar.bottom { top: 4px; right: 4px; }
      #screen-game.immersive .gamebar button,
      #screen-game.immersive .gamebar select { font-size: 12px; padding: 5px 8px; }

      /* 縦持ち回転案内（横ロックできない端末のフォールバック）。全画面内でも前面に出す */
      #rotate-hint {
        display: none; position: fixed; inset: 0; z-index: 50;
        background: #111; color: #fff; flex-direction: column;
        align-items: center; justify-content: center; text-align: center;
        font-size: 22px; line-height: 1.8;
      }

      /* スマホ没入時の操作（ギア＝右上メニュー / 💣＝下中央）。没入時のみ表示 */
      #mobile-controls { display: none; }
      #screen-game.immersive #mobile-controls { display: block; }
      #screen-game.immersive .gamebar { display: none; } /* 没入時はPC用バーを隠す */
      #gear-btn {
        position: fixed; top: 6px; right: 6px; z-index: 46;
        font-size: 20px; padding: 6px 10px; border: none; border-radius: 8px;
        background: rgba(0, 0, 0, 0.4); color: #fff; cursor: pointer;
      }
      #mobile-mine {
        position: fixed; right: 8px; top: 50%; transform: translateY(-50%); z-index: 46;
        font-size: 22px; padding: 12px 14px; border: none; border-radius: 12px;
        background: rgba(0, 0, 0, 0.4); color: #fff; cursor: pointer;
        touch-action: none; user-select: none; -webkit-user-select: none;
      }
      #gear-panel {
        display: none; position: fixed; top: 46px; right: 6px; z-index: 47;
        background: rgba(20, 20, 20, 0.92); color: #fff; border-radius: 10px;
        padding: 10px; flex-direction: column; gap: 10px; min-width: 200px;
      }
      #gear-panel.open { display: flex; }
      #screen-game.result-open #mobile-mine { display: none; } /* リザルト中は💣を隠す */
      #gear-panel .gp-row { display: flex; align-items: center; gap: 6px; font-size: 13px; }
      #gear-panel input[type="range"] { flex: 1; }
      #gear-panel button {
        font-size: 14px; padding: 10px; border: 1px solid #666; border-radius: 8px;
        background: #2a2a2a; color: #fff; cursor: pointer; text-align: left;
      }

      /* リザルトの選択ボタン（画面下中央・全画面内でも前面）*/
      #result-overlay {
        display: none; position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%);
        z-index: 48; gap: 10px;
      }
      #result-overlay.open { display: flex; }
      #result-overlay button {
        font-size: 15px; padding: 12px 18px; border: none; border-radius: 10px;
        background: #2d7dd2; color: #fff; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- タイトル背景：戦車AI同士のデモバトルを自動再生（cover表示＋暗幕） -->
    <canvas id="demo-bg"></canvas>
    <div id="demo-scrim"></div>

    <!-- ===== タイトル（モード選択）===== -->
    <section id="screen-title" class="screen active">
      <h1>ToyTank</h1>
      <div class="menu">
        <button data-action="solo">ソロ（キャンペーン20面）</button>
        <button disabled>Co-op マルチ <span class="badge soon">Coming Soon</span></button>
        <button disabled>PvP <span class="badge soon">Coming Soon</span></button>
        <button data-action="custom">自作ステージで遊ぶ</button>
        <a class="btn" href="editor.html">ToyTank Maker（ステージを作る）</a>
        <button data-action="settings">設定</button>
      </div>
    </section>

    <!-- ===== 設定 ===== -->
    <section id="screen-settings" class="screen">
      <button class="back" data-action="title">← タイトルへ戻る</button>
      <h1>設定</h1>
      <div class="row">
        全体音量：<input id="set-volume" type="range" min="0" max="100" step="1" style="vertical-align: middle; width: 200px;" />
        <span id="set-volume-val">100%</span>
      </div>
      <div class="row">
        <label><input id="set-mute" type="checkbox" /> ミュート（消音）</label>
      </div>
      <p class="muted-note">※ 操作方法のカスタマイズは今後追加予定です。</p>
    </section>

    <!-- ===== 自作ステージ一覧 ===== -->
    <section id="screen-custom" class="screen">
      <button class="back" data-action="title">← タイトルへ戻る</button>
      <h1>自作ステージで遊ぶ</h1>
      <div id="custom-empty" class="muted-note" style="display: none;">
        自作ステージがありません。<a href="editor.html">ToyTank Maker</a> で作成してください。
      </div>
      <div id="custom-list"></div>
    </section>

    <!-- ===== ゲーム ===== -->
    <section id="screen-game" class="screen">
      <div class="gamebar top">
        <button class="back" data-action="title">← タイトル</button>
        操作:
        <select id="ctrl-mode">
          <option value="mobile">スマホ</option>
          <option value="pc">PC（マウス照準）</option>
        </select>
      </div>
      <p id="load-status" style="font-size: 13px; color: #555; min-height: 16px; margin: 2px 0;"></p>
      <canvas id="game" style="border: 1px solid #999; touch-action: none;"></canvas>
      <div class="gamebar bottom">
        <button id="btn-mine">💣 地雷を置く</button>
        <button id="btn-restart">↻ リスタート (R)</button>
        <button id="btn-mute">🔊 音 ON</button>
      </div>
      <p class="instructions" style="font-size: 12px; color: #777;">
        左半分ドラッグ＝移動 / 右半分ドラッグ→離す＝照準発射 / 右半分タップ＝即撃ち / 💣＝地雷
        （PC：WASD・矢印＝移動、マウス右半ドラッグ＝照準、Space＝即撃ち、E＝地雷）
      </p>
      <!-- スマホ没入時の操作（ギア＝メニュー、💣＝地雷）。没入時のみ表示 -->
      <div id="mobile-controls">
        <button id="gear-btn" aria-label="メニュー">⚙️</button>
        <button id="mobile-mine" aria-label="地雷">💣</button>
        <div id="gear-panel">
          <div class="gp-row">
            音量
            <input id="gear-volume" type="range" min="0" max="100" step="1" />
            <span id="gear-volume-val">100%</span>
          </div>
          <button id="gear-restart">↻ リスタート</button>
          <button id="gear-title">← タイトルに戻る</button>
        </div>
      </div>

      <!-- リザルト（全クリア／残機ゼロ）時の選択ボタン -->
      <div id="result-overlay">
        <button id="result-restart">↻ もう一度プレイ</button>
        <button id="result-title">← タイトルへ戻る</button>
      </div>

      <!-- スマホ縦持ち時の回転案内（横ロックできない端末＝iOS等のフォールバック）-->
      <div id="rotate-hint">📱<br />端末を <b>横向き</b> にしてください</div>
    </section>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
