<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ToyTank</title>
  </head>
  <body style="margin: 12px; font-family: sans-serif;">
    <h1 style="font-size: 18px;">ToyTank</h1>
    <p style="font-size: 13px;">
      ステージ: <select id="stage-select"></select>
      ｜ <strong>左半分ドラッグ＝移動</strong> / <strong>右半分ドラッグ→離す＝照準発射</strong> / <strong>右半分タップ＝即撃ち</strong> / <strong>💣＝地雷</strong>。
      （PC補助：WASD・矢印＝移動、マウス右半ドラッグ＝照準、Space＝即撃ち、E＝地雷）
      作成は <a href="/editor.html">ToyTank Maker</a> へ。
    </p>
    <canvas id="game" style="border: 1px solid #999; touch-action: none;"></canvas>
    <div style="margin-top: 6px;">
      <button id="btn-mine" style="font-size: 15px; padding: 6px 14px;">💣 地雷を置く</button>
      <button id="btn-restart" style="font-size: 15px; padding: 6px 14px;">↻ リスタート (R)</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
