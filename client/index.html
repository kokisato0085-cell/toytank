<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ToyTank</title>
    <style>
      /* ===== 共通テーマ（ダーク・統一感）===== */
      :root {
        --bg: #0e141c; --panel: #1b2633; --panel2: #223040; --line: #2e3e50;
        --text: #e8edf3; --muted: #9db0c2; --accent: #f0a93b; --accentText: #1a1206;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; padding: 14px; min-height: 100vh; color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: radial-gradient(120% 90% at 50% -10%, #1b2a3d 0%, #0e141c 55%);
      }
      h1 { font-size: 22px; margin: 0 0 8px; }
      .screen { display: none; }
      .screen.active { display: block; }
      #screen-game.active:not(.immersive) { display: flex; flex-direction: column; align-items: center; }

      /* タイトル背景のデモ（戦車AIバトル）。contain表示＋暗幕でメニューを読みやすく */
      #demo-bg {
        display: none; position: fixed; inset: 0; width: 100vw; height: 100vh;
        object-fit: contain; z-index: 0; pointer-events: none; background: #000;
      }
      #demo-scrim {
        display: none; position: fixed; inset: 0; z-index: 1; pointer-events: none;
        background: linear-gradient(180deg, rgba(8, 12, 18, 0.5), rgba(8, 12, 18, 0.72));
      }
      body.demo-on #demo-bg, body.demo-on #demo-scrim { display: block; }

      /* タイトル画面：大きいロゴ＋中央寄せメニュー */
      #screen-title { position: relative; z-index: 2; text-align: center; padding-top: 3vh; }
      #screen-title h1 {
        font-size: clamp(48px, 11vw, 96px); font-weight: 900; letter-spacing: 3px; margin: 0;
        color: #fff; text-shadow: 0 3px 0 rgba(0, 0, 0, 0.35), 0 0 26px rgba(240, 169, 59, 0.35);
      }
      #screen-title h1 .accent { color: var(--accent); }
      .tagline { color: var(--muted); margin: 6px 0 0; font-size: 15px; letter-spacing: 1px; }
      .menu { display: flex; flex-direction: column; gap: 11px; max-width: 380px; margin: 24px auto 0; }
      .menu button, .menu a.btn {
        font-size: 17px; padding: 15px 18px; text-align: left; text-decoration: none; cursor: pointer;
        color: var(--text); background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
        display: flex; justify-content: space-between; align-items: center; transition: background 0.15s, transform 0.05s;
      }
      .menu button:hover, .menu a.btn:hover { background: var(--panel2); }
      .menu button:active, .menu a.btn:active { transform: translateY(1px); }
      .menu button[data-action="solo"] { background: var(--accent); color: var(--accentText); border-color: var(--accent); font-weight: 700; }
      .menu button:disabled { color: var(--muted); background: #141c26; cursor: not-allowed; }
      .badge { font-size: 11px; color: #fff; background: #c0392b; border-radius: 10px; padding: 2px 8px; }
      .badge.soon { background: #5a6b7d; }

      .back, .gamebar button, .gamebar select, #pc-panel button, #custom-list button, #set-fullscreen {
        background: var(--panel); color: var(--text); border: 1px solid var(--line); border-radius: 8px; cursor: pointer;
      }
      #set-fullscreen { font-size: 15px; padding: 9px 16px; }
      #set-fullscreen:hover { background: var(--panel2); }
      .back:hover, .gamebar button:hover, #pc-panel button:hover, #custom-list button:hover { background: var(--panel2); }
      .back { font-size: 14px; padding: 8px 14px; margin-bottom: 10px; }
      .row { margin: 12px 0; font-size: 14px; }
      .gamebar { margin: 6px 0; font-size: 13px; display: flex; gap: 8px; align-items: center; }
      .gamebar button, .gamebar select { font-size: 15px; padding: 7px 14px; }

      /* PC用 設定タブ（💣地雷・🔊音・音量）。⚙設定で開閉 */
      #pc-panel { display: none; gap: 12px; align-items: center; flex-wrap: wrap;
        margin: 6px 0; padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); }
      #pc-panel.open { display: flex; }
      #pc-panel .gp-row { display: flex; align-items: center; gap: 6px; font-size: 13px; }
      #pc-panel button { font-size: 15px; padding: 7px 14px; background: var(--panel2); }
      #screen-game.immersive #pc-panel { display: none; } /* 没入時はPCタブを隠す */

      #custom-list { display: flex; flex-direction: column; gap: 8px; max-width: 380px; }
      #custom-list button { font-size: 16px; padding: 13px 16px; text-align: left; }
      .muted-note { font-size: 13px; color: var(--muted); }

      /* PC：キャンバスの枠＋周囲のアイコン操作ガイド（殺風景の解消）*/
      #screen-game:not(.immersive) canvas {
        border: 2px solid var(--line); border-radius: 10px; background: #000;
        box-shadow: 0 10px 34px rgba(0, 0, 0, 0.5);
      }
      .controls-legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 820px; margin: 14px auto 0; }
      .controls-legend .ctrl {
        display: flex; align-items: center; gap: 12px; min-width: 190px;
        background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 10px 14px;
      }
      .controls-legend .ic { font-size: 24px; line-height: 1; }
      .controls-legend .lbl { display: flex; flex-direction: column; }
      .controls-legend .lbl b { color: var(--accent); font-size: 14px; }
      .controls-legend .lbl small { color: var(--muted); font-size: 12px; margin-top: 2px; }
      #screen-game.immersive .controls-legend { display: none; }

      /* フルスクリーン（⛶ボタン）：ページ全体を全画面化。ゲーム中はキャンバスを中央＋最大化 */
      :fullscreen body { padding: 0; }
      :fullscreen #screen-game.active:not(.immersive) { min-height: 100vh; justify-content: center; background: #000; }
      :fullscreen #screen-game #load-status,
      :fullscreen #screen-game .controls-legend { display: none; }
      :fullscreen #screen-game canvas { border: none; }
      :fullscreen #screen-game .gamebar.top {
        position: fixed; top: 6px; left: 6px; z-index: 45;
        background: rgba(0, 0, 0, 0.45); border-radius: 8px; padding: 3px 6px; margin: 0;
      }
      :fullscreen #screen-game #pc-panel.open { position: fixed; top: 52px; left: 6px; z-index: 45; }

      /* スマホ没入表示：ビューポート全体を黒で覆いキャンバスを最大化。
         操作ボタンは画面の四隅にオーバーレイ（縦スペースを予約しない）。
         実全画面API(Android)に頼らずCSSで実現＝iOSでも有効。 */
      #screen-game.immersive {
        position: fixed; inset: 0; z-index: 40; margin: 0; background: #000;
        display: flex; align-items: center; justify-content: center;
      }
      #screen-game.immersive #load-status,
      #screen-game.immersive .instructions { display: none; }
      #screen-game.immersive canvas { border: none; }
      #screen-game.immersive .gamebar {
        position: fixed; z-index: 45; margin: 0; padding: 2px;
        background: rgba(0, 0, 0, 0.35); border-radius: 8px;
        display: flex; gap: 4px; align-items: center; color: #ddd;
      }
      #screen-game.immersive .gamebar.top { top: 4px; left: 4px; }
      #screen-game.immersive .gamebar.bottom { top: 4px; right: 4px; }
      #screen-game.immersive .gamebar button,
      #screen-game.immersive .gamebar select { font-size: 12px; padding: 5px 8px; }

      /* 縦持ち回転案内（横ロックできない端末のフォールバック）。全画面内でも前面に出す */
      #rotate-hint {
        display: none; position: fixed; inset: 0; z-index: 50;
        background: #111; color: #fff; flex-direction: column;
        align-items: center; justify-content: center; text-align: center;
        font-size: 22px; line-height: 1.8;
      }

      /* スマホ没入時の操作（ギア＝右上メニュー / 💣＝下中央）。没入時のみ表示 */
      #mobile-controls { display: none; }
      #screen-game.immersive #mobile-controls { display: block; }
      #screen-game.immersive .gamebar { display: none; } /* 没入時はPC用バーを隠す */
      #gear-btn {
        position: fixed; top: 6px; right: 6px; z-index: 46;
        font-size: 20px; padding: 6px 10px; border: none; border-radius: 8px;
        background: rgba(0, 0, 0, 0.4); color: #fff; cursor: pointer;
      }
      #mobile-mine {
        position: fixed; right: 8px; top: 50%; transform: translateY(-50%); z-index: 46;
        font-size: 22px; padding: 12px 14px; border: none; border-radius: 12px;
        background: rgba(0, 0, 0, 0.4); color: #fff; cursor: pointer;
        touch-action: none; user-select: none; -webkit-user-select: none;
      }
      #gear-panel {
        display: none; position: fixed; top: 46px; right: 6px; z-index: 47;
        background: rgba(20, 20, 20, 0.92); color: #fff; border-radius: 10px;
        padding: 10px; flex-direction: column; gap: 10px; min-width: 200px;
      }
      #gear-panel.open { display: flex; }
      #screen-game.result-open #mobile-mine { display: none; } /* リザルト中は💣を隠す */
      #gear-panel .gp-row { display: flex; align-items: center; gap: 6px; font-size: 13px; }
      #gear-panel input[type="range"] { flex: 1; }
      #gear-panel button {
        font-size: 14px; padding: 10px; border: 1px solid #666; border-radius: 8px;
        background: #2a2a2a; color: #fff; cursor: pointer; text-align: left;
      }

      /* リザルトの選択ボタン（画面下中央・全画面内でも前面）*/
      #result-overlay {
        display: none; position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%);
        z-index: 48; gap: 10px;
      }
      #result-overlay.open { display: flex; }
      #result-overlay button {
        font-size: 15px; padding: 12px 18px; border: none; border-radius: 10px;
        background: #2d7dd2; color: #fff; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- タイトル背景：戦車AI同士のデモバトルを自動再生（cover表示＋暗幕） -->
    <canvas id="demo-bg"></canvas>
    <div id="demo-scrim"></div>

    <!-- ===== タイトル（モード選択）===== -->
    <section id="screen-title" class="screen active">
      <h1>Toy<span class="accent">Tank</span></h1>
      <p class="tagline">2D 戦車バトル — 跳弾と地雷で敵を全滅させろ</p>
      <div class="menu">
        <button data-action="solo">ソロ（キャンペーン20面）</button>
        <button disabled>Co-op マルチ <span class="badge soon">Coming Soon</span></button>
        <button disabled>PvP <span class="badge soon">Coming Soon</span></button>
        <button data-action="custom">自作ステージで遊ぶ</button>
        <a class="btn" href="editor.html">ToyTank Maker（ステージを作る）</a>
        <button data-action="settings">設定</button>
      </div>
    </section>

    <!-- ===== 設定 ===== -->
    <section id="screen-settings" class="screen">
      <button class="back" data-action="title">← タイトルへ戻る</button>
      <h1>設定</h1>
      <div class="row">
        全体音量：<input id="set-volume" type="range" min="0" max="100" step="1" style="vertical-align: middle; width: 200px;" />
        <span id="set-volume-val">100%</span>
      </div>
      <div class="row">
        <label><input id="set-mute" type="checkbox" /> ミュート（消音）</label>
      </div>
      <div class="row">
        <button id="set-fullscreen">⛶ フルスクリーン</button>
      </div>
      <p class="muted-note">※ 操作方法のカスタマイズは今後追加予定です。</p>
    </section>

    <!-- ===== 自作ステージ一覧 ===== -->
    <section id="screen-custom" class="screen">
      <button class="back" data-action="title">← タイトルへ戻る</button>
      <h1>自作ステージで遊ぶ</h1>
      <div id="custom-empty" class="muted-note" style="display: none;">
        自作ステージがありません。<a href="editor.html">ToyTank Maker</a> で作成してください。
      </div>
      <div id="custom-list"></div>
    </section>

    <!-- ===== ゲーム ===== -->
    <section id="screen-game" class="screen">
      <div class="gamebar top">
        <button class="back" data-action="title">← タイトル</button>
        <button id="btn-restart">↻ リスタート (R)</button>
        <button id="pc-gear">⚙ 設定</button>
      </div>
      <!-- PC用の設定タブ（💣地雷・🔊音・音量を収納）-->
      <div id="pc-panel">
        <div class="gp-row">
          音量
          <input id="pc-volume" type="range" min="0" max="100" step="1" />
          <span id="pc-volume-val">100%</span>
        </div>
        <button id="btn-mute">🔊 音 ON</button>
        <button id="btn-mine">💣 地雷を置く</button>
        <button id="btn-fullscreen">⛶ フルスクリーン</button>
      </div>
      <p id="load-status" style="font-size: 13px; color: #9db0c2; min-height: 16px; margin: 2px 0;"></p>
      <canvas id="game" style="touch-action: none;"></canvas>
      <!-- PC操作ガイド（アイコン付き）。将来チュートリアル化で差し替え予定 -->
      <div class="controls-legend instructions">
        <div class="ctrl"><span class="ic">🕹️</span><span class="lbl"><b>移動</b><small>WASD / 矢印キー</small></span></div>
        <div class="ctrl"><span class="ic">🎯</span><span class="lbl"><b>照準</b><small>マウスを動かす</small></span></div>
        <div class="ctrl"><span class="ic">💥</span><span class="lbl"><b>発射</b><small>クリック（狙い）/ Space（正面）</small></span></div>
        <div class="ctrl"><span class="ic">💣</span><span class="lbl"><b>地雷</b><small>E キー</small></span></div>
      </div>
      <!-- スマホ没入時の操作（ギア＝メニュー、💣＝地雷）。没入時のみ表示 -->
      <div id="mobile-controls">
        <button id="gear-btn" aria-label="メニュー">⚙️</button>
        <button id="mobile-mine" aria-label="地雷">💣</button>
        <div id="gear-panel">
          <div class="gp-row">
            音量
            <input id="gear-volume" type="range" min="0" max="100" step="1" />
            <span id="gear-volume-val">100%</span>
          </div>
          <button id="gear-restart">↻ リスタート</button>
          <button id="gear-title">← タイトルに戻る</button>
        </div>
      </div>

      <!-- リザルト（全クリア／残機ゼロ）時の選択ボタン -->
      <div id="result-overlay">
        <button id="result-restart">↻ もう一度プレイ</button>
        <button id="result-title">← タイトルへ戻る</button>
      </div>

      <!-- スマホ縦持ち時の回転案内（横ロックできない端末＝iOS等のフォールバック）-->
      <div id="rotate-hint">📱<br />端末を <b>横向き</b> にしてください</div>
    </section>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
